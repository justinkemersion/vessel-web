services:
  web:
    image: vessel-web:latest
    container_name: vessel-web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    # PORTS REMOVED: Traefik handles all traffic via the internal flux-network bridge.
    networks:
      - flux-network
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vessel-web.rule=Host(`vsl-base.com`) || Host(`www.vsl-base.com`)"
      - "traefik.http.routers.vessel-web.entrypoints=websecure"
      - "traefik.http.routers.vessel-web.tls.certresolver=myresolver"
      - "traefik.http.services.vessel-web.loadbalancer.server.port=3000"

networks:
  flux-network:
    external: true
